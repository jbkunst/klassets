url: https://jkunst.com/klassets/

authors:
  Joshua Kunst:
    href: https://jkunst.com

lang: en

template:
  bootstrap: 5
  bslib:
    primary: "#B7472A"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem
    base_font:
      google: "IBM Plex Sans"
    heading_font:
      google: "IBM Plex Sans"
    code_font:
      google: "Fira Mono"
    headings-color: "#3A2A26"
    headings-line-height: 1.2
    headings-margin-bottom: 0.75rem

navbar:
  bg: primary
  type: dark

reference:
- title: Simulation of Quasi-Anscombe data sets
  desc: Functions to simulate data sets with related regression patterns.
  contents:
  - starts_with("sim_quasi")
- title: Clustering helpers
  desc: Functions to simulate data and explain clustering algorithms.
  contents:
  - sim_groups
  - fit_kmeans
  - fit_hclust
  - fit_statskmeans
  - kmeans_iterations
- title: Binary classification
  desc: Functions to simulate data and explain classification algorithms.
  contents:
  - sim_response_xy
  - fit_logistic_regression
  - fit_classification_tree
  - fit_classification_random_forest
  - fit_knn
- title: Regression
  desc: Functions to simulate data and explain regression algorithms.
  contents:
  - sim_xy
  - fit_linear_model
  - fit_regression_tree
  - fit_linear_model_tree
  - fit_regression_random_forest
  - fit_loess
  - fit_mars
- title: MNIST
  desc: Functions and data sets to fit models to MNIST data and compare predictive performance and variable importance.
  contents:
  - mnist_train
  - mnist_test
  - mnist_plot_digits
- title: Example data sets
  desc: Small data sets used in examples and teaching material.
  contents:
  - idyob10k
  - idyob1k
